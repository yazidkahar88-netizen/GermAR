<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Germ AR: Pengesan Patogen Makanan</title>
    
    <!-- A-Frame and MindAR Libraries (Offline Local Assets) -->
    <script src="./js/aframe.min.js"></script>
    <script src="./js/mindar-image-aframe.prod.js"></script>
    
    <!-- Google Fonts & Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background-color: #000;
        }

        /* Fullscreen Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient(rgba(10, 10, 18, 0.65), rgba(10, 10, 18, 0.85)), url('malaysian_food_bg.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }
        .splash-logo {
            width: 140px;
            height: 140px;
            border-radius: 35px;
            box-shadow: 0 12px 35px rgba(255, 75, 43, 0.4);
            margin-bottom: 24px;
            animation: pulse 2s infinite alternate;
            object-fit: cover;
        }
        .splash-title {
            color: #fff;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
            text-align: center;
        }
        .splash-subtitle {
            color: #8f90a6;
            font-size: 16px;
            font-weight: 400;
            margin-top: 8px;
            text-align: center;
        }
        .start-btn {
            margin-top: 40px;
            padding: 16px 40px;
            background: linear-gradient(90deg, #ff416c 0%, #ff4b2b 100%);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 75, 43, 0.3);
            transition: all 0.3s ease;
        }
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 75, 43, 0.5);
        }

        /* HUD Scanner UI */
        #hud-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
        }
        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hud-title {
            background: rgba(15, 15, 27, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            pointer-events: auto;
        }
        .scanner-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            animation: scanning 4s infinite linear;
        }

        #info-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: rgba(15, 15, 27, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px 30px 0 0;
            padding: 24px 24px 34px 24px;
            z-index: 20;
            transition: bottom 0.4s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            color: white;
            pointer-events: auto;
            max-height: 50vh;
            height: 50vh;
            overflow-y: auto;
        }
        #info-sheet.active {
            bottom: 0;
        }
        .sheet-handle {
            width: 50px;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            margin: 0 auto 20px auto;
        }
        .pathogen-name {
            font-size: 24px;
            font-weight: 800;
            color: #ff416c;
            margin: 0 0 4px 0;
        }
        .food-name {
            font-size: 16px;
            font-weight: 600;
            color: #ffd000;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 14px;
        }
        .card-label {
            font-size: 12px;
            font-weight: 600;
            color: #8f90a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .card-value {
            font-size: 14px;
            line-height: 1.5;
            color: #e3e4e9;
        }
        .card-value-highlight {
            color: #39e09b;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 10px 30px rgba(255, 75, 43, 0.4); }
            100% { transform: scale(1.05); box-shadow: 0 15px 40px rgba(255, 75, 43, 0.6); }
        }
        @keyframes scanning {
            0% { border-color: rgba(255, 75, 43, 0.4); }
            50% { border-color: rgba(57, 224, 155, 0.8); }
            100% { border-color: rgba(255, 75, 43, 0.4); }
        }

        /* Floating Interaction Hint */
        .interaction-hint {
            background: rgba(15, 15, 27, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            color: #ffd000;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            pointer-events: none;
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            transition: opacity 0.3s ease, top 0.4s ease, bottom 0.4s ease, left 0.4s ease;
            opacity: 0;
            display: none;
            white-space: nowrap;
        }
        .interaction-hint.active {
            opacity: 1;
            display: block;
        }

        /* Portrait: apabila panel maklumat terbuka, petunjuk naik ke atas */
        body.sheet-open .interaction-hint {
            bottom: auto;
            top: 16px;
        }

        /* Floating Info Trigger Button */
        .info-btn {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            border: none;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 14px 28px;
            border-radius: 30px;
            box-shadow: 0 8px 25px rgba(255, 75, 43, 0.5);
            display: none;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            z-index: 20;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            pointer-events: none;
        }
        .info-btn.active {
            display: flex;
            opacity: 1;
            transform: translateX(-50%) scale(1);
            pointer-events: auto;
        }
        .info-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        /* Close button inside sheet */
        .close-sheet-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 10;
        }
        .close-sheet-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Responsive Landscape Layout */
        @media (orientation: landscape) {
            #info-sheet {
                top: 0;
                right: -55%;
                bottom: auto;
                left: auto;
                width: 45%;
                height: 100vh;
                max-height: 100vh;
                border-left: 1px solid rgba(255, 255, 255, 0.15);
                border-top: none;
                border-radius: 30px 0 0 30px;
                padding: 30px 24px 34px 24px;
                transition: right 0.4s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            }
            #info-sheet.active {
                right: 0;
                bottom: auto;
            }
            .sheet-handle {
                display: none;
            }

            /* Landscape + panel terbuka: petunjuk ke atas kiri kawasan kamera (55%) */
            body.sheet-open .interaction-hint {
                bottom: auto;
                top: 16px;
                left: 27.5%;
                font-size: 12px;
                padding: 8px 14px;
            }

            /* Landscape + panel terbuka: butang maklumat ke bawah kiri kawasan kamera */
            body.sheet-open .info-btn {
                left: 27.5%;
                bottom: 20px;
            }
            body.sheet-open .info-btn.active {
                transform: translateX(-50%) scale(1);
            }
            body.sheet-open .info-btn:active {
                transform: translateX(-50%) scale(0.95);
            }
        }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <img src="germar_logo.jpg" class="splash-logo" />
        <h1 class="splash-title">Germ AR</h1>
        <p class="splash-subtitle">Info Bakteria Penyebab Keracunan Makanan</p>
        <button class="start-btn" onclick="startAR()">MULAKAN</button>
    </div>

    <!-- HUD Container -->
    <div id="hud-container">
        <div class="scanner-frame"></div>
    </div>

    <!-- Interaction Hint Overlay -->
    <div id="interaction-hint" class="interaction-hint">
        Putar: Seret 1 Jari &nbsp;|&nbsp; Zum: Cubit 2 Jari
    </div>

    <!-- Floating Info Trigger Button -->
    <button id="info-btn" class="info-btn" onclick="openInfoSheet()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
        </svg>
        MAKLUMAT PATOGEN
    </button>

    <!-- Sliding Info Sheet -->
    <div id="info-sheet">
        <div class="sheet-handle"></div>
        <button class="close-sheet-btn" onclick="closeInfoSheet()">&times;</button>
        <h2 id="pathogen-title" class="pathogen-name">Nama Patogen</h2>
        <div id="food-title" class="food-name">Nama Makanan</div>
        
        <div class="info-grid">
            <div class="info-card">
                <div class="card-label">Habitat Asal</div>
                <div id="val-habitat" class="card-value">Memuatkan maklumat...</div>
            </div>
            <div class="info-card">
                <div class="card-label">Cara Penularan</div>
                <div id="val-pemindahan" class="card-value">Memuatkan maklumat...</div>
            </div>
            <div class="info-card">
                <div class="card-label">Simptom &amp; Tanda</div>
                <div id="val-tanda" class="card-value">Memuatkan maklumat...</div>
            </div>
            <div class="info-card">
                <div class="card-label">Kawalan &amp; Pencegahan</div>
                <div id="val-kawalan" class="card-value card-value-highlight">Memuatkan maklumat...</div>
            </div>
        </div>
    </div>

    <!-- AR Scene (MindAR + A-Frame) -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; filterMinCF:0.001; filterBeta: 10;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <a-asset-item id="susuModel" src="./models/Susu.glb"></a-asset-item>
            <a-asset-item id="oysterModel" src="./models/Oyster.glb"></a-asset-item>
            <a-asset-item id="chickenModel" src="./models/Ayam_Masak_Merah.glb"></a-asset-item>
            <a-asset-item id="laksaModel" src="./models/Laksa.glb"></a-asset-item>
            <a-asset-item id="kerabuModel" src="./models/Kerabu_Kaki_Ayam.glb"></a-asset-item>
            <a-asset-item id="serimukaModel" src="./models/Kuih_Seri_Muka.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Lights -->
        <a-light type="ambient" color="#fff" intensity="0.8"></a-light>
        <a-light type="directional" color="#fff" intensity="0.5" position="1 2 1"></a-light>

        <!-- Ayam Masak Merah Target -->
        <a-entity mindar-image-target="targetIndex: 0" id="target-chicken">
            <a-gltf-model rotation="0 0 0" position="0 0 0" scale="0.2 0.2 0.2" src="#chickenModel"></a-gltf-model>
        </a-entity>

        <!-- Kerabu Kaki Ayam Target -->
        <a-entity mindar-image-target="targetIndex: 1" id="target-kerabu">
            <a-gltf-model rotation="0 0 0" position="0 0 0" scale="0.25 0.25 0.25" src="#kerabuModel"></a-gltf-model>
        </a-entity>

        <!-- Kuih Seri Muka Target -->
        <a-entity mindar-image-target="targetIndex: 2" id="target-serimuka">
            <a-gltf-model rotation="0 0 0" position="0 0 0" scale="0.2 0.2 0.2" src="#serimukaModel"></a-gltf-model>
        </a-entity>

        <!-- Laksa Target -->
        <a-entity mindar-image-target="targetIndex: 3" id="target-laksa">
            <a-gltf-model rotation="0 0 0" position="0 0 0" scale="0.2 0.2 0.2" src="#laksaModel"></a-gltf-model>
        </a-entity>

        <!-- Susu Target -->
        <a-entity mindar-image-target="targetIndex: 4" id="target-susu">
            <a-gltf-model rotation="0 90 0" position="0 0 0" scale="0.2 0.2 0.2" src="#susuModel"></a-gltf-model>
        </a-entity>

        <!-- Oyster Target -->
        <a-entity mindar-image-target="targetIndex: 5" id="target-oyster">
            <a-gltf-model rotation="0 0 0" position="0 0 0" scale="0.2 0.2 0.2" src="#oysterModel"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        // Database
        const pathogenDb = {
            0: {
                name: "Campylobacter",
                food: "Susu Mentah",
                habitat: "Lembu, ayam, itik, burung, haiwan peliharaan & air tercemar.",
                transfer: "Memakan makanan kurang masak, air tercemar atau pencemaran silang dari daging mentah.",
                symptoms: "Cirit-birit (biasanya berdarah), sakit perut yang teruk, pening & muntah. [Inkubasi: 2-5 hari]",
                control: "Asingkan daging mentah daripada makanan masak, serta masak dengan sempurna."
            },
            1: {
                name: "Vibrio Parahaemolyticus",
                food: "Tiram",
                habitat: "Persekitaran laut (air masin). Pembiakan sangat cepat.",
                transfer: "Pencemaran silang daripada makanan laut mentah ke makanan siap masak.",
                symptoms: "Cirit-birit berair, sakit perut, kejang abdomen, muntah & demam. [Inkubasi: 12-24 jam]",
                control: "Masak makanan laut dengan sempurna & basuh menggunakan air bersih."
            },
            2: {
                name: "Salmonella",
                food: "Ayam Masak Merah",
                habitat: "Haiwan peliharaan, tikus, lalat, lipas & daging mentah.",
                transfer: "Pencemaran silang dari daging mentah, peralatan kotor, atau pengendali tercemar.",
                symptoms: "Cirit-birit, sakit perut, muntah, loya & demam. [Inkubasi: 12-36 jam]",
                control: "Masak ayam/telur sepenuhnya (>75°C) & asingkan peralatan mentah/masak."
            },
            3: {
                name: "Staphylococcus aureus",
                food: "Laksa",
                habitat: "Manusia & haiwan (kulit, hidung, telinga, bisul/luka bernanah).",
                transfer: "Kebersihan diri pengendali yang lemah atau makanan dibiarkan di suhu bilik melebihi 4 jam.",
                symptoms: "Loya, muntah teruk, sakit perut & cirit-birit. [Inkubasi: 2-4 jam]",
                control: "Individu sakit/luka dilarang menyediakan makanan & cuci tangan dengan sabun."
            },
            4: {
                name: "Escherichia coli",
                food: "Kerabu Kaki Ayam",
                habitat: "Najis manusia dan haiwan.",
                transfer: "Makanan/air yang tercemar dengan najis atau kurang masak.",
                symptoms: "Cirit-birit berdarah, sakit perut yang amat sangat & muntah. Boleh bawa maut. [Inkubasi: 10-15 jam]",
                control: "Masak makanan secukupnya (>75°C) & sentiasa gunakan air bersih."
            },
            5: {
                name: "Bacillus cereus",
                food: "Kuih Seri Muka",
                habitat: "Persekitaran, debu & tanah.",
                transfer: "Makanan masak dibiarkan di suhu bilik melebihi 4 jam atau dipanaskan kurang sempurna.",
                symptoms: "Loya, muntah & cirit-birit. [Inkubasi: 1-6 jam (muntah) atau 6-24 jam (cirit-birit)]",
                control: "Simpan baki makanan dalam peti sejuk & panaskan semula dengan sempurna."
            }
        };

        // UI Selectors
        const sheet = document.getElementById("info-sheet");
        const titlePat = document.getElementById("pathogen-title");
        const titleFood = document.getElementById("food-title");
        const valHab = document.getElementById("val-habitat");
        const valTrans = document.getElementById("val-pemindahan");
        const valSymp = document.getElementById("val-tanda");
        const valCtrl = document.getElementById("val-kawalan");

        function startAR() {
            // Hide splash screen
            document.getElementById("splash-screen").style.opacity = 0;
            setTimeout(() => {
                document.getElementById("splash-screen").style.display = "none";
            }, 500);

            // Start A-Scene AR System safely
            const sceneEl = document.querySelector('a-scene');
            const startSystem = () => {
                if (sceneEl.systems && sceneEl.systems["mindar-image-system"]) {
                    sceneEl.systems["mindar-image-system"].start();
                } else {
                    console.error("Germ AR: mindar-image-system not found!");
                }
            };

            if (sceneEl.hasLoaded) {
                startSystem();
            } else {
                sceneEl.addEventListener("loaded", startSystem);
            }
        }

        // Restart MindAR when screen orientation changes (landscape <-> portrait)
        let arRestartTimeout = null;
        function restartMindAR() {
            const sceneEl = document.querySelector('a-scene');
            if (!sceneEl || !sceneEl.systems || !sceneEl.systems['mindar-image-system']) return;
            // Only restart if AR has been started (splash is hidden)
            if (document.getElementById('splash-screen').style.display === 'none') {
                const sys = sceneEl.systems['mindar-image-system'];
                clearTimeout(arRestartTimeout);
                arRestartTimeout = setTimeout(() => {
                    try {
                        sys.stop();
                        setTimeout(() => sys.start(), 600);
                    } catch(e) { console.log('AR restart error:', e); }
                }, 300);
            }
        }
        // Listen to both orientationchange and resize for maximum compatibility
        window.addEventListener('orientationchange', restartMindAR);
        screen.orientation && screen.orientation.addEventListener('change', restartMindAR);
        // Debounced resize for browsers that don't fire orientationchange
        let resizeTimer = null;
        let lastW = window.innerWidth;
        window.addEventListener('resize', () => {
            // Only restart if width changed significantly (orientation flip)
            if (Math.abs(window.innerWidth - lastW) > 100) {
                lastW = window.innerWidth;
                restartMindAR();
            }
        });

        // Global variables for Touch Interaction
        let activeModel = null;
        let baseScale = 0.2;
        let currentScale = 0.2;
        let currentRotation = { x: 0, y: 0, z: 0 };
        
        let touchStartDist = 0;
        let touchStartScale = 0.2;
        let lastTouchX = 0;
        let lastTouchY = 0;
        
        const hintPill = document.getElementById("interaction-hint");
        const infoBtn = document.getElementById("info-btn");

        function openInfoSheet() {
            sheet.classList.add("active");
            document.body.classList.add("sheet-open");
            infoBtn.classList.remove("active");
        }

        function closeInfoSheet() {
            sheet.classList.remove("active");
            document.body.classList.remove("sheet-open");
            if (activeModel) {
                infoBtn.classList.add("active");
            }
        }

        // Dipanggil oleh butang Back Android melalui Java
        // Mengembalikan true jika panel info berjaya ditutup (Java tidak perlu buat apa-apa)
        // Mengembalikan false jika panel tiada — Java akan minimumkan apps
        function androidBackPressed() {
            if (sheet.classList.contains('active')) {
                closeInfoSheet();
                return true;
            }
            return false;
        }

        // Register Target Events dynamically
        document.addEventListener("DOMContentLoaded", () => {
            const targets = [
                { id: "target-chicken", idx: 2, scale: 0.2, rot: { x: 0, y: 0, z: 0 } },
                { id: "target-kerabu", idx: 4, scale: 0.25, rot: { x: 0, y: 0, z: 0 } },
                { id: "target-serimuka", idx: 5, scale: 0.2, rot: { x: 0, y: 0, z: 0 } },
                { id: "target-laksa", idx: 3, scale: 0.2, rot: { x: 0, y: 0, z: 0 } },
                { id: "target-susu", idx: 0, scale: 0.2, rot: { x: 0, y: 90, z: 0 } },
                { id: "target-oyster", idx: 1, scale: 0.2, rot: { x: 0, y: 0, z: 0 } }
            ];

            targets.forEach(t => {
                const el = document.getElementById(t.id);
                
                el.addEventListener("targetFound", () => {
                    console.log(`Target ${t.id} Found!`);
                    const data = pathogenDb[t.idx];
                    
                    // Populate UI
                    titlePat.innerText = data.name;
                    titleFood.innerText = data.food;
                    valHab.innerText = data.habitat;
                    valTrans.innerText = data.transfer;
                    valSymp.innerText = data.symptoms;
                    valCtrl.innerText = data.control;
                    
                    // Show Button and Hint (Do NOT auto-show full sheet)
                    infoBtn.classList.add("active");
                    hintPill.classList.add("active");
                    sheet.classList.remove("active");

                    // Sembunyi kotak scanner apabila model ditemui
                    document.querySelector('.scanner-frame').style.opacity = '0';

                    // Set Active Model for Touch Interaction
                    activeModel = el.querySelector("a-gltf-model");
                    baseScale = t.scale;
                    currentScale = t.scale;
                    currentRotation = { ...t.rot };
                    
                    // Reset model transforms to default rotation and scale
                    activeModel.setAttribute("scale", `${currentScale} ${currentScale} ${currentScale}`);
                    activeModel.setAttribute("rotation", `${currentRotation.x} ${currentRotation.y} ${currentRotation.z}`);
                });

                el.addEventListener("targetLost", () => {
                    console.log(`Target ${t.id} Lost!`);
                    // Sembunyikan Panel, Butang dan Petunjuk
                    sheet.classList.remove("active");
                    document.body.classList.remove("sheet-open");
                    infoBtn.classList.remove("active");
                    hintPill.classList.remove("active");

                    // Paparkan semula kotak scanner apabila model hilang
                    document.querySelector('.scanner-frame').style.opacity = '1';
                    
                    if (activeModel === el.querySelector("a-gltf-model")) {
                        activeModel = null;
                    }
                });
            });
        });

        // Pengatur sentuhan untuk putar dan zum model 3D
        // (diabaikan jika sentuhan bermula dalam panel maklumat)
        window.addEventListener("touchstart", (e) => {
            if (!activeModel) return;
            // Jika jari menyentuh panel maklumat, abaikan — biarkan panel menatal
            if (e.target.closest('#info-sheet')) return;
            
            if (e.touches.length === 1) {
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                touchStartDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                touchStartScale = currentScale;
            }
        });
        
        window.addEventListener("touchmove", (e) => {
            if (!activeModel) return;
            // Jika jari menggeser dalam panel maklumat, abaikan — biarkan panel menatal
            if (e.target.closest('#info-sheet')) return;
            
            if (e.touches.length === 1) {
                // One finger drag: rotate model (Y axis: left/right drag, X axis: up/down drag)
                const deltaX = e.touches[0].clientX - lastTouchX;
                const deltaY = e.touches[0].clientY - lastTouchY;
                
                currentRotation.y += deltaX * 0.4;
                currentRotation.x += deltaY * 0.4;
                
                activeModel.setAttribute("rotation", `${currentRotation.x} ${currentRotation.y} 0`);
                
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                // Two fingers pinch: resize model
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                
                if (touchStartDist > 0) {
                    const factor = dist / touchStartDist;
                    // Clamp scale between 0.05x (min) and 1.5x (max)
                    currentScale = Math.max(0.05, Math.min(1.5, touchStartScale * factor));
                    activeModel.setAttribute("scale", `${currentScale} ${currentScale} ${currentScale}`);
                }
            }
        });
    </script>
</body>
</html>
